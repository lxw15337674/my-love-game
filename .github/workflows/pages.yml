name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Love2D web export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare clean game source
        run: |
          rm -rf build dist
          mkdir -p build/game-src
          cp main.lua build/game-src/
          cp -R assets build/game-src/assets
          cat > build/game-src/conf.lua <<'LUA'
          function love.conf(t)
            t.identity = "heartcore_survivor"
            t.version = "11.4"
            t.console = false
            t.window.title = "心核幸存者"
            t.window.width = 960
            t.window.height = 540
            t.window.resizable = false
            t.window.vsync = 1
          end
          LUA

      - name: Build web version with love.js
        run: |
          npx --yes love.js@11.4.1 build/game-src dist -c -t "心核幸存者" -m 134217728
          ./scripts/patch-web-export.py dist
          touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
