name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Love2D web export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare clean game source
        run: |
          rm -rf build dist
          mkdir -p build/game-src
          cp conf.lua main.lua build/game-src/
          cp -R assets build/game-src/assets
          python3 - <<'PY'
          from pathlib import Path
          p = Path('build/game-src/conf.lua')
          s = p.read_text(encoding='utf-8')
          replacements = {
              't.window.width = 1280': 't.window.width = 960',
              't.window.height = 720': 't.window.height = 540',
              't.window.resizable = true': 't.window.resizable = false',
              't.window.msaa = 4': 't.window.msaa = 0',
              't.window.highdpi = true': 't.window.highdpi = false',
              't.window.usedpiscale = true': 't.window.usedpiscale = false',
          }
          for old, new in replacements.items():
              s = s.replace(old, new)
          p.write_text(s, encoding='utf-8')
          PY

      - name: Build web version with love.js
        run: |
          npx --yes love.js@11.4.1 build/game-src dist -c -t "心核幸存者" -m 134217728
          ./scripts/patch-web-export.py dist
          touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
