const G = {state:'menu',selectedChar:0,selectedObj:0,danger:0,wave:1,maxWave:10,waveTime:SURVIVAL_DURATION,waveElapsed:0,kills:0,coins:0,xp:0,xpNeed:24,level:1,enemies:[],shots:[],enemyShots:[],pickups:[],texts:[],shop:[],locked:[false,false,false,false],refresh:0,freeRefresh:1,levelChoices:[],objectiveText:'',objectiveProgress:0,run:{damage:0,coins:0},msg:'',msgT:0};
let P;
function rnd(a=1,b){ if(b===undefined)return Math.random()*a; return a+Math.random()*(b-a); }
function dist(a,b,c,d){return Math.hypot(a-c,b-d)} function angle(a,b,c,d){return Math.atan2(d-b,c-a)} function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function plan(){return wavePlans[G.wave-1]||wavePlans[wavePlans.length-1]} function affix(){return affixes[G.wave-1]||affixes[affixes.length-1]} function objective(){return objectives[G.selectedObj]||objectives[0]}
function bonus(){const a=affix(), r=a[2], p=a[5]; return {coin:r.coin||1,xp:r.xp||1,pdmg:r.pdmg||1,crit:r.crit||0,pickup:r.pickup||0,regen:(r.regen||1)*(p.regen||1),ehp:p.ehp||1,espeed:p.espeed||1,edmg:p.edmg||1,armor:p.armor||0,extra:p.extra||0,int:p.int||1};}
function makePlayer(){const ch=chars[G.selectedChar]||chars[0]; const p={x:W/2,y:H/2,r:20,hp:ch.hp,maxHp:ch.hp,shield:ch.shield,maxShield:ch.shield,regen:7,speed:ch.speed,pickup:82,inv:0,engT:0,weapons:[],...ch.stats}; addWeapon(weapons[ch.weapon],p,true); return p;}
function addWeapon(def,p=P,free=false){const old=p.weapons.find(w=>w.id===def.id); if(old){old.lvl++;old.dmg+=Math.max(1,def.dmg*.28);old.cd*=.94;toast(`${old.name} 合成至等级 ${old.lvl}`);return true;} if(p.weapons.length>=6&&!free){toast('武器槽已满：先回收一把');return false;} const w={...def,lvl:1,timer:0}; p.weapons.push(w); def.stat&&def.stat(p); if(!free)toast(`已装备：${w.name}`); return true;}
function reset(){P=makePlayer(); Object.assign(G,{state:'playing',wave:1,waveTime:SURVIVAL_DURATION,waveElapsed:0,kills:0,coins:chars[G.selectedChar].coins,xp:0,xpNeed:24,level:1,enemies:[],shots:[],enemyShots:[],pickups:[],texts:[],shop:[],locked:[false,false,false,false],refresh:0,freeRefresh:1+Math.floor(P.luck/3),levelChoices:[],objectiveProgress:0,run:{damage:0,coins:0},msg:'',msgT:0}); rollShop(); startWave(true);}
function startWave(first=false){G.state='playing';G.waveTime=SURVIVAL_DURATION;G.waveElapsed=0;G.enemies=[];G.shots=[];G.enemyShots=[];G.pickups=[];G.spawnT=.2;G.eventI=0;G.waveStartKills=G.kills;G.objectiveText=`生存 ${SURVIVAL_DURATION}秒`; if(!first)toast(`第 ${G.wave} 波：${plan().name}`);}
function completeWave(msg='波次完成'){const harvest=Math.max(0,P.harvest||0); if(harvest){G.coins+=harvest;G.run.coins+=harvest;} if(G.wave>=G.maxWave){G.state='victory';return;} G.wave++; const gain=10+G.wave*2+G.danger*2; G.coins+=gain;G.run.coins+=gain; enterShop(msg);}
function enterShop(msg='战后补给'){G.state='shop';G.refresh=0;rollShop();toast(msg);}
function toast(s){G.msg=s;G.msgT=2.1;}
function weightedEnemy(){const entries=plan().enemies; let total=entries.reduce((s,e)=>s+e[1],0), roll=rnd(total); for(const [k,w] of entries){roll-=w;if(roll<=0)return enemyDefs[k];} return enemyDefs.splinter;}
function spawnPoint(side){const top=140,bottom=70;if(side==='left')return[-55,rnd(top,H-bottom)];if(side==='right')return[W+55,rnd(top,H-bottom)];if(side==='top')return[rnd(120,W-120),-55];if(side==='bottom')return[rnd(120,W-120),H+55];return spawnPoint(['left','right','top','bottom'][(rnd(4))|0]);}
function spawn(def=weightedEnemy(),side){const b=bonus(), [x,y]=spawnPoint(side||plan().sides[(rnd(plan().sides.length))|0]); const danger=1+G.danger*.08, hp=def.hp*(1+(G.wave-1)*.14)*b.ehp*danger; G.enemies.push({...def,x,y,hp,maxHp:hp,speed:(def.speed+G.wave*2)*b.espeed*(1+G.danger*.025),dmg:def.dmg*b.edmg*(1+G.danger*.06),armor:(def.armor||0)+b.armor,shootT:rnd(1.2),dashT:rnd(1.6)});}
function spawnPack(){const b=bonus(), n=plan().pack+b.extra, side=plan().sides[(rnd(plan().sides.length))|0]; for(let i=0;i<n;i++)spawn(weightedEnemy(),side);}
function rollShop(){const used={}; for(let i=0;i<4;i++) if(G.locked[i]&&G.shop[i]) used[G.shop[i].name]=true; for(let i=0;i<4;i++) if(!G.locked[i]){let it=shopItem(); for(let j=0;j<10&&used[it.name];j++)it=shopItem(); G.shop[i]=it;used[it.name]=true;}}
function shopItem(){ if(Math.random()<.48){ const w=weapons[weaponKeys[(rnd(weaponKeys.length))|0]]; return {kind:'武器',rarity:'稀有',name:w.name,price:w.price,desc:`${brands[w.brand].name} / ${elements[w.element].name} / ${w.desc}`,color:brands[w.brand].color,weapon:w}; } const it=itemPool[(rnd(itemPool.length))|0]; const color=it.rarity==='史诗'?C.purple:it.rarity==='稀有'?C.cyan:C.white; return {...it,color}; }
function buy(i){const item=G.shop[i]; if(!item)return; if(G.coins<item.price){toast('晶币不足');return;} let ok=true; if(item.weapon)ok=addWeapon(item.weapon); else {item.buy(P);toast(`获得：${item.name}`);} if(!ok)return; G.coins-=item.price; G.shop[i]=shopItem(); G.locked[i]=false;}
function recycle(){const w=P.weapons.pop(); if(!w){toast('没有可回收武器');return;} const v=Math.max(8,Math.floor((w.price||20)*.45+w.lvl*4)); G.coins+=v;toast(`回收 ${w.name}：+${v} 晶币`);}
function levelChoices(){const used={}, arr=[]; for(let i=0;i<3;i++){let r=levelPool[(rnd(levelPool.length))|0]; for(let j=0;j<12&&used[r[0]];j++)r=levelPool[(rnd(levelPool.length))|0]; used[r[0]]=true; arr.push(r);} G.levelChoices=arr; G.state='levelup'; toast(`等级 ${G.level}：选择强化`);}
function chooseLevel(i){const r=G.levelChoices[i]; if(!r)return; r[2](P); G.levelChoices=[]; G.state='playing'; toast(`升级选择：${r[0]}`);}
function gainXp(n){const b=bonus(); G.xp+=Math.max(1,Math.round(n*b.xp)); if(G.state==='playing'&&G.xp>=G.xpNeed){G.xp-=G.xpNeed;G.level++;G.xpNeed=Math.floor(G.xpNeed*1.25+8);levelChoices();}}
function damageEnemy(e,d,el='kinetic',crit=false,src='未知'){const dmg=Math.max(1,d-Math.max(0,e.armor||0)); e.hp-=dmg; G.run.damage+=dmg; if(P.lifesteal>0&&Math.random()<P.lifesteal)P.hp=Math.min(P.maxHp,P.hp+1); G.texts.push({x:e.x,y:e.y-e.r,t:String(dmg|0)+(crit?'!':''),life:.7,c:crit?C.gold:(elements[el]||elements.kinetic).color}); if(e.hp<=0)kill(e);}
function kill(e){G.kills++; const b=bonus(), coin=Math.max(1,Math.round(e.coin*b.coin)); G.coins+=coin;G.run.coins+=coin; G.pickups.push({x:e.x,y:e.y,k:'xp',v:e.xp,r:6}); if(Math.random()<.55)G.pickups.push({x:e.x+rnd(-12,12),y:e.y+rnd(-12,12),k:'coin',v:Math.max(1,(e.coin/2)|0),r:7});}
function fire(w,target,ang){const b=bonus(), crit=Math.random()<Math.min(.85,P.crit+b.crit), dmg=w.dmg*P.damage*b.pdmg*(crit?P.critDamage:1); G.shots.push({x:P.x,y:P.y,a:ang,v:(w.speed||0)*P.projSpeed,d:dmg,r:w.splash?7:5,life:(w.range*P.range)/Math.max(1,w.speed||420),el:w.element,color:elements[w.element].color,splash:w.splash||0,aura:w.aura||0,bounce:(w.bounce||0)+P.bounce,pierce:P.pierce,crit,src:w.name});}
function update(dt){if(G.msgT>0)G.msgT-=dt; G.texts=G.texts.filter(t=>(t.life-=dt)>0); if(G.state!=='playing')return; const b=bonus(); G.waveElapsed+=dt; G.waveTime-=dt; updatePlayer(dt,b); updateWeapons(dt,b); updateShots(dt); updateEnemies(dt); updatePickups(dt); updateObjective(dt); const evs=plan().events||[]; while(evs[G.eventI]&&G.waveElapsed>=evs[G.eventI].time){const ev=evs[G.eventI++];spawn(enemyDefs[ev.enemy]||weightedEnemy(),ev.side); if(ev.msg)toast(ev.msg);} G.spawnT=(G.spawnT||0)-dt; if(G.spawnT<=0&&!(plan().boss&&G.waveElapsed<4)){spawnPack(); const pressure=G.waveElapsed/SURVIVAL_DURATION; G.spawnT=Math.max(.30,plan().interval*b.int-pressure*.16);} if(G.waveTime<=0){G.waveTime=0; completeWave(G.wave>=G.maxWave?'生存完成':'波次完成');}}
function updatePlayer(dt,b){let dx=(keys.has('a')||keys.has('arrowleft')?-1:0)+(keys.has('d')||keys.has('arrowright')?1:0), dy=(keys.has('w')||keys.has('arrowup')?-1:0)+(keys.has('s')||keys.has('arrowdown')?1:0); if(dx||dy){let l=Math.hypot(dx,dy);P.x=clamp(P.x+dx/l*P.speed*dt,30,W-30);P.y=clamp(P.y+dy/l*P.speed*dt,30,H-30);} P.inv=Math.max(0,(P.inv||0)-dt); P.shield=Math.min(P.maxShield,P.shield+P.regen*b.regen*dt); if(P.engineering>0){P.engT=(P.engT||0)-dt;if(P.engT<=0){P.engT=Math.max(.45,1.15-P.engineering*.06);const t=nearest(P.x,P.y,420);if(t)damageEnemy(t,8+P.engineering*5,'arc',false,'工程无人机');}}}

function updateWeapons(dt,b){for(const w of P.weapons){w.timer-=dt; if(w.timer<=0){const t=nearest(P.x,P.y,w.range*P.range); if(t){if(w.chain){let pool=G.enemies.slice().sort((a,c)=>dist(t.x,t.y,a.x,a.y)-dist(t.x,t.y,c.x,c.y)).slice(0,w.chain+Math.floor(P.bounce/2)); pool.forEach(e=>damageEnemy(e,w.dmg*P.damage*b.pdmg,w.element,false,w.name));} else {const base=angle(P.x,P.y,t.x,t.y), n=w.count||1; for(let i=0;i<n;i++){const off=n===1?0:((i-(n-1)/2)/Math.max(1,n-1))*(w.spread||0);fire(w,t,base+off);}} w.timer=w.cd/Math.max(.25,P.fireRate);}}}}
function updateShots(dt){G.shots=G.shots.filter(s=>{s.x+=Math.cos(s.a)*s.v*dt;s.y+=Math.sin(s.a)*s.v*dt;s.life-=dt;if(s.aura)for(const e of G.enemies)if(dist(s.x,s.y,e.x,e.y)<s.aura+e.r){e.x+=(s.x-e.x)*dt*.9;e.y+=(s.y-e.y)*dt*.9;damageEnemy(e,s.d*dt*.8,s.el,false,s.src);} for(const e of G.enemies){if(dist(s.x,s.y,e.x,e.y)<e.r+s.r){damageEnemy(e,s.d,s.el,s.crit,s.src); if(s.splash)for(const o of G.enemies)if(o!==e&&dist(e.x,e.y,o.x,o.y)<s.splash)damageEnemy(o,s.d*.45,s.el,false,s.src); if(s.pierce-->0)continue; return false;}} return s.life>0&&s.x>-80&&s.x<W+80&&s.y>-80&&s.y<H+80;}); G.enemyShots=G.enemyShots.filter(s=>{s.x+=s.vx*dt;s.y+=s.vy*dt;s.life-=dt; if(dist(s.x,s.y,P.x,P.y)<P.r+s.r){hurt(s.d);return false;} return s.life>0&&s.x>-60&&s.x<W+60&&s.y>-60&&s.y<H+60;});}

function updateEnemies(dt){G.enemies=G.enemies.filter(e=>e.hp>0).map(e=>{let a=angle(e.x,e.y,P.x,P.y), sp=e.speed; if(e.behavior==='shooter'&&dist(e.x,e.y,P.x,P.y)<430){e.shootT-=dt;if(e.shootT<=0){G.enemyShots.push({x:e.x,y:e.y,vx:Math.cos(a)*250,vy:Math.sin(a)*250,r:6,d:e.dmg*.75,color:e.color,life:3});e.shootT=1.65;}sp*=.52;} else if(e.behavior==='charger'){e.dashT-=dt;if(e.dashT<=0&&dist(e.x,e.y,P.x,P.y)<360){sp*=2.4;e.dashT=2.2;text(e.x,e.y-e.r-8,'突进',C.orange);}} else if(e.behavior==='guard')sp*=.78; else if(e.behavior==='aura'&&dist(e.x,e.y,P.x,P.y)<135)hurt(e.dmg*.22); else if(e.behavior==='boss'){e.shootT-=dt;if(e.shootT<=0){[-.22,0,.22].forEach(o=>G.enemyShots.push({x:e.x,y:e.y,vx:Math.cos(a+o)*260,vy:Math.sin(a+o)*260,r:7,d:e.dmg*.7,color:e.color,life:3}));e.shootT=1.25;}} e.x+=Math.cos(a)*sp*dt;e.y+=Math.sin(a)*sp*dt;if(dist(e.x,e.y,P.x,P.y)<e.r+P.r){hurt(e.dmg);e.x-=Math.cos(a)*18;e.y-=Math.sin(a)*18;} return e;});}

function drawBuild(x,y,w,h){panel(x,y,w,h);ctx.textAlign='center';ctx.font='17px sans-serif';ctx.fillStyle=C.white;ctx.fillText('当前构筑',x+w/2,y+29);const rows=[['伤害',pct(P.damage)],['射速',pct(P.fireRate)],['暴击',pct(P.crit)],['护甲',P.armor],['闪避',pct(P.dodge)],['吸血',pct(P.lifesteal)],['工程',P.engineering],['收获',P.harvest],['幸运',P.luck]];ctx.font='13px sans-serif';rows.forEach((r,i)=>{const yy=y+48+i*22;ctx.fillStyle='rgba(255,255,255,.08)';round(x+14,yy,w-28,18,7,true);ctx.textAlign='left';ctx.fillStyle=C.muted;ctx.fillText(r[0],x+28,yy+13);ctx.textAlign='right';ctx.fillStyle=C.white;ctx.fillText(r[1],x+w-34,yy+13);});ctx.textAlign='center';ctx.fillStyle=C.gold;ctx.fillText('武器',x+w/2,y+h-54);ctx.fillStyle=C.muted;wrap(P.weapons.map(w=>`${w.name} 等级${w.lvl}`).join(' / '),x+18,y+h-34,w-36,18,'center');}
function drawLevelup(){ctx.fillStyle='rgba(0,0,0,.58)';ctx.fillRect(0,0,W,H);panel(W/2-420,160,840,360);ctx.textAlign='center';ctx.font='36px sans-serif';ctx.fillStyle=C.gold;ctx.fillText('等级提升：选择强化',W/2,222);ctx.font='17px sans-serif';ctx.fillStyle=C.muted;ctx.fillText('按 1 / 2 / 3 选择，本波暂停，选完继续。',W/2,260);const cw=240,ch=165,gap=28,sx=W/2-(cw*3+gap*2)/2;G.levelChoices.forEach((r,i)=>{const x=sx+i*(cw+gap),y=318;panel(x,y,cw,ch);ctx.font='22px sans-serif';ctx.fillStyle=C.white;ctx.fillText(`${i+1}. ${r[0]}`,x+cw/2,y+54);ctx.font='17px sans-serif';ctx.fillStyle=C.cyan;ctx.fillText(r[1],x+cw/2,y+108);});}
function drawEnd(){ctx.fillStyle='rgba(0,0,0,.58)';ctx.fillRect(0,0,W,H);panel(W/2-300,205,600,260);ctx.textAlign='center';ctx.font='38px sans-serif';ctx.fillStyle=G.state==='victory'?C.gold:C.red;ctx.fillText(G.state==='victory'?'通关完成':'心核破碎',W/2,268);ctx.font='19px sans-serif';ctx.fillStyle=C.white;ctx.fillText(G.state==='victory'?'心核稳定，虚空退潮。':'构筑失败。虚空可没那么温柔。',W/2,320);ctx.fillStyle=C.gold;ctx.fillText(`波次 ${G.wave}   击杀 ${G.kills}   晶币 ${G.coins}`,W/2,360);ctx.fillStyle=C.cyan;ctx.fillText(`总伤害 ${Math.floor(G.run.damage)}   收入 ${Math.floor(G.run.coins)}   危险 ${G.danger}`,W/2,390);ctx.fillStyle=C.muted;ctx.fillText('回车回到选择界面 / Esc 退出',W/2,425);}
function wrap(t,x,y,w,lh,align='left'){ctx.textAlign=align;let line='', yy=y, drawX=align==='center'?x+w/2:x;for(const ch of t){const test=line+ch;if(ctx.measureText(test).width>w){ctx.fillText(line,drawX,yy);line=ch;yy+=lh;}else line=test;}ctx.fillText(line,drawX,yy);}
let last=performance.now();function loop(now){const dt=Math.min(.033,(now-last)/1000);last=now;update(dt);draw();requestAnimationFrame(loop)}requestAnimationFrame(loop);
})();
</script>
